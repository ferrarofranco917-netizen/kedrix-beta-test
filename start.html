<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kedrix — Accesso Beta</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0f1f 0%, #0c1222 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #f8fafc;
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: rgba(18, 25, 45, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 32px 28px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .beta-badge {
      display: inline-block;
      background: rgba(59, 130, 246, 0.2);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      color: #60a5fa;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 8px;
      text-align: center;
    }
    .subtitle {
      color: #94a3b8;
      text-align: center;
      font-size: 14px;
      margin: 0 0 32px;
    }
    .input-group { margin-bottom: 20px; }
    label {
      display: block;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 16px;
      color: #f1f5f9;
      font-size: 16px;
      transition: all 0.2s ease;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    input::placeholder { color: #475569; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
    }
    button:active { transform: translateY(0); }
    button.loading {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .error-message {
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
    .error-message.show { display: block; }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #475569;
    }
    .center { text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="center"><div class="beta-badge">BETA PROGRAM</div></div>
    <h1>Kedrix</h1>
    <p class="subtitle">Decision Intelligence Finance</p>

    <div class="input-group">
      <label for="name">Nome</label>
      <input type="text" id="name" placeholder="es. Mario Rossi" autocomplete="name">
    </div>

    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="mario@example.com" autocomplete="email">
    </div>

    <button id="btn">Accedi alla beta</button>
    <div id="errorMessage" class="error-message"></div>
    <div class="footer">Accesso beta con attivazione automatica</div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbym1hNeSD8iy8Uw7qLidjoslm92n15xrZDXRLVWEZvicQGPBVYb6ENzoy1LgFN1w46QDA/exec';
    const APP_URL = 'https://beta.kedrix.tech';

    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const btn = document.getElementById('btn');
    const errorDiv = document.getElementById('errorMessage');

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }

    function hideError() {
      errorDiv.classList.remove('show');
      errorDiv.textContent = '';
    }

    function setLoading(isLoading, text) {
      btn.classList.toggle('loading', isLoading);
      btn.disabled = isLoading;
      btn.textContent = text;
    }

    async function requestBetaAccess() {
      const name = nameInput.value.trim();
      const email = emailInput.value.trim().toLowerCase();

      if (!name) {
        showError('Inserisci il tuo nome');
        nameInput.focus();
        return;
      }

      if (!email) {
        showError('Inserisci la tua email');
        emailInput.focus();
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError('Inserisci un indirizzo email valido');
        emailInput.focus();
        return;
      }

      hideError();
      setLoading(true, 'Attivazione in corso...');

      try {
        const payload = {
          action: 'register_beta_request',
          name,
          email,
          source: 'start-page',
          reason: 'beta_access_request',
          commitment: 'tester',
          auto_approve: true,
          trial_days: 30
        };

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload),
          mode: 'cors',
          credentials: 'omit',
          cache: 'no-store'
        });

        const rawText = await response.text();
        console.log('START RAW RESPONSE:', rawText);

        let data = {};
        try {
          data = rawText ? JSON.parse(rawText) : {};
        } catch (_e) {
          throw new Error('Risposta dal server non valida');
        }

        if (!data.ok) {
          throw new Error(data.error || 'Registrazione non riuscita');
        }

        if (!data.tester_id || !data.email) {
          throw new Error('Tester ID o email non ricevuti');
        }

        const expiry = data.expires_at || '';

        localStorage.setItem('tester_id', data.tester_id);
        localStorage.setItem('kedrix_tester_id', data.tester_id);
        localStorage.setItem('license_email', data.email);
        localStorage.setItem('kedrix_email', data.email);
        localStorage.setItem('license_expires_at', expiry);
        localStorage.setItem('kedrix_license_expires_at', expiry);
        localStorage.setItem('kedrix_expiry', expiry);
        localStorage.setItem('kedrix_beta', 'active');
        localStorage.setItem('kedrix_start_seeded', 'true');
        localStorage.setItem('kedrix_license_status', (data.status || 'active').toLowerCase());
        localStorage.setItem('kedrix_license_type', 'beta');
        localStorage.setItem('kedrix_license_message', data.message || 'Accesso beta attivo.');
        localStorage.setItem('bw-license-valid', data.access_allowed === false ? 'invalid' : 'valid');
        localStorage.setItem('bw-license-expiry', expiry);

        setLoading(true, 'Accesso pronto...');

        const params = new URLSearchParams();
        params.set('tester_id', data.tester_id);
        params.set('email', data.email);
        if (expiry) params.set('expiry', expiry);
        params.set('status', (data.status || 'active').toLowerCase());

        window.location.href = `${APP_URL}/?${params.toString()}`;
      } catch (err) {
        console.error('START ERROR:', err);
        showError(err && err.message ? err.message : 'Errore di connessione. Riprova più tardi.');
        setLoading(false, 'Accedi alla beta');
      }
    }

    btn.addEventListener('click', requestBetaAccess);
    [nameInput, emailInput].forEach((input) => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          requestBetaAccess();
        }
      });
    });
  </script>
</body>
</html>
