<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kedrix — Accesso Beta</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 320px;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      background: #1a2233;
      color: white;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #0ea5e9;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Accesso Beta Kedrix</h1>

  <input id="name" placeholder="Nome">
  <input id="email" placeholder="Email">

  <button id="btn">Entra</button>
</div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbym1hNeSD8iy8Uw7qLidjoslm92n15xrZDXRLVWEZvicQGPBVYb6ENzoy1LgFN1w46QDA/exec";

document.getElementById('btn').addEventListener('click', () => {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!name || !email) {
    alert("Inserisci nome ed email");
    return;
  }

  const btn = document.getElementById('btn');
  btn.classList.add('loading');
  btn.innerText = "Accesso in corso...";

  const form = document.createElement("form");
  form.method = "POST";
  form.action = ENDPOINT;
  form.style.display = "none";

  const inputName = document.createElement("input");
  inputName.name = "name";
  inputName.value = name;

  const inputEmail = document.createElement("input");
  inputEmail.name = "email";
  inputEmail.value = email;

  const inputSource = document.createElement("input");
  inputSource.name = "source";
  inputSource.value = "start-page";

  form.appendChild(inputName);
  form.appendChild(inputEmail);
  form.appendChild(inputSource);

  document.body.appendChild(form);
  form.submit();
});
</script>

</body>
</html>
