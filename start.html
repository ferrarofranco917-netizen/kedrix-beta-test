<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kedrix — Accesso Beta</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 320px;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      background: #1a2233;
      color: white;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #0ea5e9;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Accesso Beta Kedrix</h1>

  <input id="name" placeholder="Nome">
  <input id="email" placeholder="Email">

  <button id="btn">Entra</button>
</div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbym1hNeSD8iy8Uw7qLidjoslm92n15xrZDXRLVWEZvicQGPBVYb6ENzoy1LgFN1w46QDA/exec";

document.getElementById('btn').addEventListener('click', async () => {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!name || !email) {
    alert("Inserisci nome ed email");
    return;
  }

  const btn = document.getElementById('btn');
  btn.classList.add('loading');
  btn.innerText = "Accesso in corso...";

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        name,
        email,
        source: "start-page"
      })
    });

    const text = await res.text();
    console.log("RAW:", text);

    const data = JSON.parse(text);

    if (!data.ok) throw new Error(data.error);

    // 🔥 SALVATAGGIO CORRETTO
    localStorage.setItem("tester_id", data.tester_id);
    localStorage.setItem("license_email", data.email);
    localStorage.setItem("license_expires_at", data.expiry);

    localStorage.setItem("kedrix_beta", "active");
    localStorage.setItem("kedrix_tester_id", data.tester_id);
    localStorage.setItem("kedrix_email", data.email);
    localStorage.setItem("kedrix_expiry", data.expiry);

    console.log("STORAGE OK");

    // 🔥 REDIRECT SICURO
    setTimeout(() => {
      const params = new URLSearchParams({
        tester_id: data.tester_id,
        email: data.email,
        expiry: data.expiry
      });

      window.location.href = "https://beta.kedrix.tech/?" + params.toString();
    }, 150);

  } catch (err) {
    console.error(err);
    alert("Errore: " + err.message);
    btn.classList.remove('loading');
    btn.innerText = "Entra";
  }
});
</script>

</body>
</html>
