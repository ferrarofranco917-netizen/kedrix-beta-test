<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kedrix — Personal Finance Engine</title>
    <meta name="description" content="Control your financial decisions. With clarity.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* Il tuo CSS esistente rimane invariato */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ... tutto il resto del tuo CSS ... */
    </style>
</head>
<body>
    <div id="app">
        <!-- Il contenuto della tua app -->
    </div>

    <script>
        // ============================================================
        // KEDRIX BETA — LICENSE SYSTEM (inline)
        // ============================================================
        
        const LICENSE_STORAGE_KEY = 'kedrix_license_data';
        
        function getLicenseData() {
            try {
                const stored = localStorage.getItem(LICENSE_STORAGE_KEY);
                if (stored) return JSON.parse(stored);
            } catch (e) {
                console.error('Error reading license data:', e);
            }
            return null;
        }
        
        function setLicenseData(licenseKey, testerId, email) {
            const data = {
                license_key: licenseKey,
                tester_id: testerId,
                email: email,
                activated_at: new Date().toISOString(),
                last_check: new Date().toISOString()
            };
            localStorage.setItem(LICENSE_STORAGE_KEY, JSON.stringify(data));
            return data;
        }
        
        function autoLogin() {
            const urlParams = new URLSearchParams(window.location.search);
            let licenseKey = urlParams.get('license');
            let testerId = urlParams.get('tester');
            let email = urlParams.get('email');
            
            if (licenseKey && testerId && email) {
                setLicenseData(licenseKey, testerId, email);
                const cleanUrl = window.location.pathname + window.location.hash;
                window.history.replaceState({}, document.title, cleanUrl);
                console.log('Auto-login effettuato con successo');
                return true;
            }
            
            const existingData = getLicenseData();
            if (existingData) {
                console.log('Licenza esistente trovata:', existingData.tester_id);
                return true;
            }
            
            console.log('Nessuna licenza trovata, reindirizzamento alla landing');
            window.location.href = 'https://kedrix-landing-v2.kedrix-corp.workers.dev';
            return false;
        }
        
        function getCurrentTesterId() {
            const data = getLicenseData();
            return data ? data.tester_id : null;
        }
        
        function getCurrentEmail() {
            const data = getLicenseData();
            return data ? data.email : null;
        }
        
        // ============================================================
        // CARICAMENTO DATI APP (DOPO L'AUTO-LOGIN)
        // ============================================================
        
        async function loadAppData() {
            const testerId = getCurrentTesterId();
            const email = getCurrentEmail();
            
            if (!testerId || !email) {
                console.log('Attesa auto-login...');
                return;
            }
            
            console.log('Caricamento dati per tester:', testerId);
            
            // Qui va la logica per caricare i dati dell'utente
            // Esempio: fetch dati dal backend, popolare UI, ecc.
            
            // Mostra l'interfaccia con i dati caricati
            document.body.classList.add('loaded');
        }
        
        function setupEventListeners() {
            // I tuoi event listener esistenti
        }
        
        // ============================================================
        // INIZIALIZZAZIONE — ORDINE CORRETTO
        // ============================================================
        
        document.addEventListener('DOMContentLoaded', function() {
            // 1. PRIMA auto-login (legge URL e salva localStorage)
            const loginSuccess = autoLogin();
            
            // 2. POI carica i dati usando la licenza salvata
            if (loginSuccess) {
                loadAppData();
            }
            
            // 3. INFINE setup eventi
            setupEventListeners();
        });
    </script>
</body>
</html>
